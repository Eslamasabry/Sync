name: sync_flutter
description: "Flutter reader client for the Sync audiobook-EPUB alignment project."
publish_to: 'none'
version: 0.1.5+6

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  crypto: ^3.0.6
  dio: ^5.9.0
  file_picker: ^10.3.2
  flutter_riverpod: ^3.0.3
  google_fonts: ^6.3.2
  just_audio: ^0.10.5
  path_provider: ^2.1.5
  web_socket_channel: ^3.0.3
  archive: ^4.0.9
  xml: ^6.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
